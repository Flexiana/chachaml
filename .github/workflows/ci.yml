name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-fmt:
    name: Lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: 1.12.0.1530
          clj-kondo: 2024.11.14
      - name: clj-kondo
        run: clj-kondo --lint src test --fail-level warning
      - name: cljfmt check
        run: clojure -M:fmt-check

  test:
    name: Tests (${{ matrix.tool }} / JDK ${{ matrix.jdk }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [deps, lein]
        jdk:  ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: 1.12.0.1530
          lein: 2.11.2
      - name: Cache Maven & Gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-${{ matrix.tool }}-${{ matrix.jdk }}-${{ hashFiles('deps.edn', 'project.clj') }}
      - name: Run tests (deps)
        if: matrix.tool == 'deps'
        run: clojure -M:test
      - name: Run tests (lein)
        if: matrix.tool == 'lein'
        run: lein test

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: 1.12.0.1530
      - name: Cloverage
        run: clojure -M:coverage
